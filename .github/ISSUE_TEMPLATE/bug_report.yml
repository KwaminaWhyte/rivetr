name: Bug Report
description: Report something that isn't working as documented
title: "[bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please search existing issues first to avoid duplicates.
        **Do not report security vulnerabilities here** — see SECURITY.md for private reporting.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: How can a maintainer reproduce this?
      placeholder: |
        1. Configure '...'
        2. Deploy app '...'
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / output
      description: Relevant log output or error messages. Redact any secrets.
      render: shell
  - type: dropdown
    id: runtime
    attributes:
      label: Container runtime
      options:
        - Docker
        - Podman
        - Not sure
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Rivetr version
      description: Output of `rivetr --version` or the release tag.
      placeholder: "v0.10.23"
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Host OS / arch
      placeholder: "Ubuntu 24.04 x86_64"
    validations:
      required: true
