name: Feature Request
description: Suggest a new feature or an improvement to an existing one
title: "[feat]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion. Search existing issues and the ROADMAP.md first.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve? What are you trying to do?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like to happen?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches or existing workarounds.
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Backend (Rust)
        - Frontend (React/TypeScript)
        - Deployment / runtime
        - Documentation
        - Other / not sure
    validations:
      required: true
